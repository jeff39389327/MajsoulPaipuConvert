# 在 Windows 上全凍結打包 GUI（PyInstaller backend.exe + electron-builder NSIS），
# 並把產生的安裝檔上傳到 GitHub Releases 的 rolling「latest」預發佈版。
#
# 外部相依（打包前取得）：
#   - tensoul-py-ng：已直接納入本 repo（MIT），checkout 即帶著，毋需另外取得。
#   - mjai-reviewer.exe：從 Equim-chan/mjai-reviewer 的 Releases 下載 Windows 版。
#   - Chrome 瀏覽器：執行期才需要（爬取 ID），打包不需要。
name: build-release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

# 同一分支的舊建置自動取消，避免堆疊
concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      MJAI_REPO: Equim-chan/mjai-reviewer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps + PyInstaller
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # requirements 釘了 obsolete 的 PyPI backport asyncio==3.4.3，會遮蔽並破壞
          # 3.11 內建的 asyncio；移除以使用標準庫版本。
          pip uninstall -y asyncio
          pip install pyinstaller

      - name: Download bundled mjai-reviewer.exe
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path gui/vendor | Out-Null
          New-Item -ItemType Directory -Force -Path mjai_tmp | Out-Null
          # mjai-reviewer 的 release 全部標記為 prerelease，`gh release download`（取 latest）
          # 會回 "release not found"。改用 API 列出所有 release，挑最新一個含 Windows zip 的資產。
          $headers = @{
            'User-Agent'    = 'gh-actions'
            'Accept'        = 'application/vnd.github+json'
            'Authorization' = "Bearer $env:GH_TOKEN"
          }
          $releases = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/$env:MJAI_REPO/releases?per_page=20"
          $asset = $null
          foreach ($r in $releases) {
            $a = $r.assets | Where-Object { $_.name -match 'windows' -and $_.name -match '\.zip$' } | Select-Object -First 1
            if ($a) { $asset = $a; break }
          }
          if ($null -eq $asset) { Write-Error "找不到 mjai-reviewer 的 Windows zip 資產"; exit 1 }
          Write-Host "下載資產: $($asset.name)"
          # browser_download_url 會轉址到 githubusercontent；下載本身不帶 Authorization（帶了會被拒）。
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile mjai_tmp/mjai.zip
          Expand-Archive -Path mjai_tmp/mjai.zip -DestinationPath mjai_tmp/extracted -Force
          # 預編譯執行檔可能叫 mjai-reviewer.exe 或 akochan-reviewer.exe（mjai-reviewer 的前身），
          # 對 `--no-review --mjai-out` 的純轉換用法相容；取任一 reviewer exe，統一命名為 mjai-reviewer.exe。
          $exe = Get-ChildItem mjai_tmp/extracted -Recurse -Include 'mjai-reviewer.exe', 'akochan-reviewer.exe' | Select-Object -First 1
          if ($null -eq $exe) { $exe = Get-ChildItem mjai_tmp/extracted -Recurse -Filter '*reviewer*.exe' | Select-Object -First 1 }
          if ($null -eq $exe) { Write-Error "解壓後找不到 reviewer 執行檔"; exit 1 }
          Copy-Item $exe.FullName gui/vendor/mjai-reviewer.exe -Force
          Write-Host "已放置 gui/vendor/mjai-reviewer.exe (來源: $($exe.Name))"

      - name: Backend smoke test (NDJSON protocol)
        shell: pwsh
        run: node gui/test/smoke.js
        env:
          PYTHON: python

      # electron-updater 以 latest.yml 的 version 欄位（非 tag）比對是否有新版，故每次建置都要
      # 遞增版本，否則已安裝的使用者永遠偵測不到更新。用單調遞增的 run_number 當 patch 版號。
      - name: Bump GUI version for auto-update
        shell: pwsh
        working-directory: gui
        run: npm version "0.1.${{ github.run_number }}" --no-git-tag-version --allow-same-version

      - name: Install GUI deps & build (freeze backend + electron-builder)
        shell: pwsh
        working-directory: gui
        env:
          PYTHONUTF8: '1'
          PYTHONIOENCODING: utf-8
        run: |
          npm install
          npm run dist

      - name: Collect installer
        id: collect
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist_gui -Recurse -Filter *.exe | Select-Object -First 1
          if ($null -eq $exe) { Write-Error "dist_gui 內找不到輸出的 .exe"; exit 1 }
          Write-Host "built: $($exe.FullName)"
          # auto-update 元資料：electron-builder 產生的 latest.yml 必須隨安裝檔一起發佈，
          # electron-updater 才能抓到 {releaseUrl}/latest.yml 比對版本。
          if (-not (Test-Path dist_gui/latest.yml)) { Write-Error "dist_gui 內找不到 latest.yml（auto-update 必需）"; exit 1 }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MajsoulPaipuGUI-windows
          path: |
            dist_gui/*.exe
            dist_gui/latest.yml
            dist_gui/*.blockmap
          if-no-files-found: error

      # rolling 'latest' 預發佈版：先刪掉舊的 release 與 tag，下一步才會在「目前的 commit」重建。
      # 否則 (a) softprops 不會移動既有 tag，release 會一直掛在舊 commit；(b) 若有人手動刪了
      # release，殘留的舊 tag 會讓後續 release 仍掛在過時 commit。刪除失敗（不存在）即略過。
      - name: Reset rolling 'latest' release + tag
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>$null
          gh api -X DELETE "repos/$env:GITHUB_REPOSITORY/git/refs/tags/latest" 2>$null
          exit 0

      - name: Publish to Releases (rolling latest)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: Latest build
          prerelease: true
          body: |
            自 `main` 自動建置的最新 Windows 安裝檔。
            Commit: ${{ github.sha }}
            Version: 0.1.${{ github.run_number }}
          files: |
            dist_gui/*.exe
            dist_gui/latest.yml
            dist_gui/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
